[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Redirection API vers le backend Railway
[[redirects]]
  from = "/api/*"
  to = "https://find-my-job-ai-react-findmyjobai.up.railway.app/api/:splat"
  status = 200
  force = true

# Custom domain / Netlify URL
[build.production]
  url = "https://find-my-job-ai.netlify.app"

# SPA fallback pour React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200