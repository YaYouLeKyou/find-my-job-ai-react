[build]
  base = "frontend"
  publish = "dist"
  command = "npm run build"

[build.environment]
  NODE_VERSION = "20"

# Redirection API vers le backend
[[redirects]]
  from = "/api/*"
  to = "https://votre-backend-url.com/api/:splat"
  status = 200
  force = true

# SPA fallback pour React Router
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200